<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | DEEP-INT</title>
    <link rel="stylesheet" href="estilo.css">
</head>
<body>

    <header>
        <h1>DEEP-INT</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="modulos.html">Módulos de Prueba</a>
            <a href="contacto.html" class="active">Contacto y Registro</a>
        </nav>
    </header>

    <section class="contact-section">
        <div class="form-container">
            <h2>Crea tu cuenta de prueba</h2>
            <p>Inicia tu preparación para el mundo laboral hoy mismo.</p>
            
            <form action="#">
                <div class="input-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>
                </div>
                <div class="input-group">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" placeholder="tu@correo.com" required>
                </div>
                <div class="input-group">
                    <label for="area">Área de interés principal</label>
                    <select id="area">
                        <option value="programacion">Programación y Desarrollo</option>
                        <option value="redes">Redes e Infraestructura</option>
                        <option value="seguridad">Ciberseguridad</option>
                        <option value="auditoria">Auditoría en Sistemas</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary btn-full">Registrarse y Comenzar</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 DEEP-INT - Proyecto de Auditoría en Sistemas Computacionales.</p>
    </footer>

</body>
</html>
