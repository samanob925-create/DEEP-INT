<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | DEEP-INT</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <h1>DEEP-INT</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="#nosotros">Quiénes Somos</a>
            <a href="modulos.html">Lenguajes de Prueba</a>
            <a href="contacto.html" class="active">Contacto y Registro</a>
        </nav>
    </header>

    <section class="contact-section">
        <div class="form-container">
            <h2>Crea tu cuenta de prueba</h2>
            <p>Inicia tu preparación para el mundo del desarrollo hoy mismo.</p>
            
            <form id="registroForm">
                <div class="input-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>
                </div>
                <div class="input-group">
                    <label for="correo">Correo electrónico</label>
                    <input type="email" id="correo" placeholder="tu@correo.com" required>
                </div>
                <div class="input-group">
                    <label for="area">Lenguaje de interés principal</label>
                    <select id="area">
                        <option value="java">Java</option>
                        <option value="python">Python</option>
                        <option value="c">C</option>
                        <option value="cplusplus">C++</option>
                        <option value="php">PHP</option>
                        <option value="javascript">JavaScript</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary btn-full">Registrarse y Comenzar</button>
            </form>
        </div>
    </section>

   <script type="module">
        // Importamos las herramientas de Firebase (versión para navegador web)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // Tu nueva configuración del proyecto deep-int-app
        const firebaseConfig = {
            apiKey: "AIzaSyBGkBAjdlhc3n_q5fOA_2LlsmNe8Zoo4jo",
            authDomain: "deep-int-app.firebaseapp.com",
            projectId: "deep-int-app",
            storageBucket: "deep-int-app.firebasestorage.app",
            messagingSenderId: "562048760920",
            appId: "1:562048760920:web:72beb68f0141f3e73ade2d"
        };

        // Inicializamos Firebase y la Base de Datos
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Lógica del botón de registro
        document.getElementById('registroForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nombre = document.getElementById('nombre').value;
            const correo = document.getElementById('correo').value;
            const area = document.getElementById('area').value;

            const btn = document.querySelector('.btn-primary');
            btn.innerText = "Guardando...";

            try {
                // Guardamos en la colección "usuarios"
                await addDoc(collection(db, "usuarios"), {
                    nombre: nombre,
                    correo: correo,
                    lenguaje: area,
                    fechaRegistro: new Date().toISOString()
                });

                alert("¡Registro exitoso! Ya estás en la base de datos de DEEP-INT.");
                document.getElementById('registroForm').reset();
                btn.innerText = "Registrarse y Comenzar";

            } catch (error) {
                console.error("Error al guardar: ", error);
                alert("Hubo un error al registrar. Intenta de nuevo.");
                btn.innerText = "Registrarse y Comenzar";
            }
        });
    </script>

    <footer>
        <p>&copy; 2026 DEEP-INT - Proyecto de Auditoría en Sistemas Computacionales.</p>
    </footer>

</body>
</html>
